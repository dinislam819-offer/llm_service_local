<!DOCTYPE html>
<html>
<head>
    <title>🚗 Avto Search Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); height: 100vh; display: flex; }
        #chat { flex: 1; max-width: 800px; margin: auto; background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; }
        .message { margin-bottom: 20px; display: flex; }
        .user { justify-content: flex-end; }
        .ai { justify-content: flex-start; }
        .bubble { max-width: 70%; padding: 12px 18px; border-radius: 18px; }
        .user .bubble { background: #007AFF; color: white; }
        .ai .bubble { background: #f2f2f2; color: #333; }
        #input { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px 18px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { padding: 12px 24px; background: #007AFF; color: white; border: none; border-radius: 25px; cursor: pointer; }
        button:hover { background: #0056cc; }
    </style>
</head>
<body>
    <div id="chat">
        <div id="messages"></div>
        <div id="input">
            <input id="message" placeholder="🔍 Спроси о машинах..." />
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>
    <script>
        const ws = new WebSocket(`ws://${location.host}/api/v1/chat/ws-chat`);
        const messages = document.getElementById('messages');
        const input = document.getElementById('message');

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            displayMessage(data.answer || data.content, 'ai');
        };

        function displayMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `<div class="bubble">${text}</div>`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            displayMessage(text, 'user');
            input.value = '';
            ws.send(JSON.stringify({message: text}));
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
